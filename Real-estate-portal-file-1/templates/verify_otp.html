{% extends "base.html" %}

{% block title %}Verify Details - Real Estate Portal{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h3>Verify Your Email</h3>
            <p class="text-muted small">We've sent a 6-digit code to your email.</p>
        </div>

        <form method="POST">
            <div class="mb-4">
                <input type="text" name="otp" class="form-control form-control-lg text-center fw-bold"
                    placeholder="Enter 6-digit OTP" maxlength="6" required style="letter-spacing: 5px;">
            </div>
            <button class="btn btn-primary w-100 py-2">Verify & Register</button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">Didn't receive the email? <a href="{{ url_for('register') }}"
                    class="text-primary-custom">Try registering again</a></small>
        </div>
    </div>
</div>
{% endblock %}
