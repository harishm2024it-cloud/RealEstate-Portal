{% extends "base.html" %}

{% block title %}Contact Seller - Real Estate Portal{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h3>Contact Seller</h3>
            <p class="text-muted small">Send a message to the verified owner</p>
        </div>

        <div class="bg-light-custom p-3 rounded mb-4">
            <h6 class="fw-bold text-secondary mb-1">{{ property.title }}</h6>
            <div class="small text-muted mb-2">
                <i class="fas fa-user me-1"></i> {{ property.owner.name }}
            </div>
            <div class="small text-muted">
                <i class="fas fa-envelope me-1"></i> {{ property.owner.email }}
            </div>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label for="message" class="form-label">Your Message</label>
                <textarea name="message" class="form-control" placeholder="I am interested in this property..." rows="5"
                    required></textarea>
            </div>
            <button class="btn btn-primary w-100 py-2 mb-3">Send Message</button>
        </form>

        <div class="text-center">
            <a href="{{ url_for('property_detail', property_id=property.id) }}"
                class="text-decoration-none text-muted small">Back to Property Details</a>
        </div>
    </div>
</div>
{% endblock %}
