{% extends "base.html" %}

{% block title %}Login - Real Estate Portal{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h3>Welcome Back</h3>
            <p class="text-muted small">Login to access your property dashboard</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" name="email" id="email" placeholder="name@example.com"
                    required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" name="password" id="password"
                    placeholder="Enter your password" required>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label small text-muted" for="remember">Remember me</label>
                </div>
                <a href="{{ url_for('forgot_password') }}"
                    class="text-primary-custom text-decoration-none small fw-bold">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Log In</button>

            <div class="text-center mt-4">
                <span class="text-muted small">New to RealEstate? </span>
                <a href="{{ url_for('register') }}"
                    class="text-primary-custom fw-bold text-decoration-none small">Create Account</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
