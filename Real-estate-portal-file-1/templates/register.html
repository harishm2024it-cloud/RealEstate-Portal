{% extends "base.html" %}

{% block title %}Sign Up - Real Estate Portal{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h3>Create Account</h3>
            <p class="text-muted small">Join thousands of property owners and seekers</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" name="name" id="name" placeholder="John Doe" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" name="email" id="email" placeholder="name@example.com"
                    required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" name="password" id="password"
                    placeholder="Create a strong password" required>
                <small class="text-muted" style="font-size: 0.75rem;">Must be at least 8 characters long</small>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Sign Up</button>

            <div class="text-center mt-4">
                <span class="text-muted small">Already have an account? </span>
                <a href="{{ url_for('login') }}" class="text-primary-custom fw-bold text-decoration-none small">Log
                    In</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
