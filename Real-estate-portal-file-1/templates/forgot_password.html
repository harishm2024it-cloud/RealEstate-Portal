{% extends "base.html" %}

{% block title %}Forgot Password - Real Estate Portal{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h3>Forgot Password?</h3>
            <p class="text-muted small">Enter your email to receive a verification code.</p>
        </div>

        <form method="POST">
            <div class="mb-4">
                <label for="email" class="form-label">Email Address</label>
                <input name="email" type="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Send OTP</button>

            <div class="text-center mt-3">
                <a href="{{ url_for('login') }}" class="text-decoration-none text-muted small">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
